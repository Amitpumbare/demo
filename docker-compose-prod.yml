services:

  postgres:
    image: postgres:16
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: post1234
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: trading-redis
    restart: unless-stopped

  backend:
    image: amitumbare/trading-backend
    container_name: trading-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trading_engine
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: post1234
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

  frontend:
    image: amitumbare/trading-frontend
    container_name: trading-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: